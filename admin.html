<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AAN Admin Dashboard</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<header>

<nav class="navbar container">

<a href="index.html" class="logo">

<img src="logo.png" alt="AAN">

<span>Algae Africa Network</span>

</a>

</nav>

</header>

<section class="page-hero">

<div class="container">

<h1>Administrator Dashboard</h1>

<p>

Manage membership applications and approve new members.

</p>

</div>

</section>

<section class="section">

<div class="container">

<h2>Administrator Login</h2>

<form id="loginForm" class="membership-form">

<input
type="email"
id="adminEmail"
placeholder="Administrator Email"
required>

<input
type="password"
id="adminPassword"
placeholder="Password"
required>

<button type="submit" class="btn-primary">

Login

</button>

</form>

</div>

</section>

<section class="section" id="dashboard" style="display:none;">

<div class="container">

<h2>Pending Membership Applications</h2>

<div id="applications">

Loading...

</div>

</div>

</section>

<footer>

<div class="container">

<p>

© 2026 Algae Africa Network

</p>

</div>

</footer>

<script type="module" src="admin.js"></script>

</body>

</html>
